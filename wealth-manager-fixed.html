<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>財富自由</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
/* === DESIGN TOKENS === */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22;
  --color-success-highlight: #d4dfcc;
  --color-error: #a12c7b;
  --color-error-hover: #7d1e5e;
  --color-error-highlight: #e0ced7;
  --color-warning: #964219;
  --color-warning-highlight: #ddcfc6;
  --color-gold: #d19900;
  --color-gold-highlight: #e9e0c6;
  --color-blue: #006494;
  --color-blue-highlight: #c6d8e4;
  --color-orange: #da7101;
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --font-body: 'Noto Sans TC', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --sidebar-width: 240px;
}
[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #797876;
  --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45;
  --color-success-highlight: #3a4435;
  --color-error: #d163a7;
  --color-error-hover: #b9478f;
  --color-error-highlight: #4c3d46;
  --color-warning: #bb653b;
  --color-warning-highlight: #564942;
  --color-gold: #e8af34;
  --color-gold-highlight: #4d4332;
  --color-blue: #5591c7;
  --color-blue-highlight: #3a4550;
  --color-orange: #fdab43;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
    --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
    --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
    --color-success: #6daa45; --color-success-highlight: #3a4435;
    --color-error: #d163a7; --color-error-highlight: #4c3d46;
    --color-warning: #bb653b; --color-warning-highlight: #564942;
    --color-gold: #e8af34; --color-gold-highlight: #4d4332;
    --color-blue: #5591c7; --color-blue-highlight: #3a4550;
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
    --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  }
}

/* === BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-bg); display: flex; }
img { display: block; max-width: 100%; height: auto; }
ul { list-style: none; }
input, button, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
table { border-collapse: collapse; width: 100%; }
a, button, [role="button"], input, select { transition: color var(--transition-interactive), background var(--transition-interactive), border-color var(--transition-interactive), box-shadow var(--transition-interactive); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
::selection { background: oklch(from var(--color-primary) l c h / 0.2); }

/* === LAYOUT === */
.sidebar {
  width: var(--sidebar-width);
  min-height: 100dvh;
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
  transition: transform var(--transition-interactive);
}
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-4) var(--space-6);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.page-area {
  padding: var(--space-6) var(--space-8);
  flex: 1;
}

/* === SIDEBAR === */
.sidebar-logo {
  padding: var(--space-5) var(--space-5);
  border-bottom: 1px solid var(--color-divider);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-weight: 700;
  font-size: var(--text-base);
  color: var(--color-primary);
}
.sidebar-nav { padding: var(--space-4) var(--space-3); flex: 1; }
.nav-section-label {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: var(--space-3) var(--space-2) var(--space-2);
  margin-top: var(--space-2);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  cursor: pointer;
  user-select: none;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); }
.nav-item.active { background: var(--color-primary-highlight); color: var(--color-primary); font-weight: 600; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

/* === TOPBAR === */
.page-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); }
.topbar-actions { display: flex; align-items: center; gap: var(--space-3); }
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  border: none;
  white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }
.btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost { background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border); }
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-danger { background: var(--color-error); color: white; }
.btn-danger:hover { background: var(--color-error-hover); }
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: var(--radius-md);
  color: var(--color-text-muted); cursor: pointer;
}
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.icon-btn svg { width: 18px; height: 18px; }

/* === KPI CARDS === */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.kpi-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
}
.kpi-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-2); }
.kpi-value { font-size: var(--text-xl); font-weight: 700; font-variant-numeric: tabular-nums lining-nums; font-family: var(--font-mono); color: var(--color-text); line-height: 1.1; }
.kpi-sub { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-2); display: flex; align-items: center; gap: var(--space-1); }
.kpi-sub .up { color: var(--color-success); }
.kpi-sub .down { color: var(--color-error); }

/* === SECTIONS === */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
.section-title { font-size: var(--text-base); font-weight: 700; color: var(--color-text); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); margin-bottom: var(--space-6); }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

/* === TABLE === */
.table-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: var(--space-6); }
.table-card-header { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-divider); display: flex; align-items: center; justify-content: space-between; }
table { font-size: var(--text-sm); }
thead th { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); background: var(--color-surface-offset); padding: var(--space-3) var(--space-5); text-align: left; white-space: nowrap; }
tbody tr { border-top: 1px solid var(--color-divider); }
tbody tr:hover { background: var(--color-surface-offset); }
tbody td { padding: var(--space-3) var(--space-5); color: var(--color-text); font-variant-numeric: tabular-nums; }
.td-muted { color: var(--color-text-muted); }
.td-mono { font-family: var(--font-mono); font-size: var(--text-xs); }

/* === BADGE === */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px var(--space-2); border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 600; white-space: nowrap;
}
.badge-green { background: var(--color-success-highlight); color: var(--color-success); }
.badge-red { background: var(--color-error-highlight); color: var(--color-error); }
.badge-gold { background: var(--color-gold-highlight); color: var(--color-gold); }
.badge-blue { background: var(--color-blue-highlight); color: var(--color-blue); }
.badge-orange { background: var(--color-warning-highlight); color: var(--color-warning); }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: oklch(0.2 0.01 80 / 0.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition-interactive);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: 90dvh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform var(--transition-interactive);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { padding: var(--space-5) var(--space-6); border-bottom: 1px solid var(--color-divider); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: var(--text-base); font-weight: 700; }
.modal-body { padding: var(--space-6); }
.modal-footer { padding: var(--space-4) var(--space-6); border-top: 1px solid var(--color-divider); display: flex; gap: var(--space-3); justify-content: flex-end; }

/* === FORM === */
.form-group { margin-bottom: var(--space-5); }
.form-label { display: block; font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); margin-bottom: var(--space-2); }
.form-input, .form-select {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-surface);
  font-size: var(--text-sm);
  color: var(--color-text);
  transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

/* === CHART AREA === */
.chart-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-5); box-shadow: var(--shadow-sm); margin-bottom: var(--space-6); }
canvas { display: block; }

/* === EMPTY STATE === */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-16) var(--space-8); text-align: center; color: var(--color-text-muted); }
.empty-icon { width: 48px; height: 48px; color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { font-size: var(--text-base); font-weight: 700; color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { font-size: var(--text-sm); max-width: 32ch; margin-bottom: var(--space-5); }

/* === TRANSACTION LIST === */
.tx-item { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-3) var(--space-5); border-top: 1px solid var(--color-divider); }
.tx-item:hover { background: var(--color-surface-offset); }
.tx-icon { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tx-icon svg { width: 15px; height: 15px; }
.tx-meta { flex: 1; min-width: 0; }
.tx-name { font-size: var(--text-sm); font-weight: 600; }
.tx-date { font-size: var(--text-xs); color: var(--color-text-muted); }
.tx-amount { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.tx-amount.positive { color: var(--color-success); }
.tx-amount.negative { color: var(--color-error); }

/* === TABS === */
.tabs { display: flex; gap: 2px; background: var(--color-surface-offset); border-radius: var(--radius-lg); padding: 3px; width: fit-content; margin-bottom: var(--space-5); }
.tab-btn { padding: var(--space-2) var(--space-4); border-radius: calc(var(--radius-lg) - 3px); font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); cursor: pointer; border: none; background: none; }
.tab-btn.active { background: var(--color-surface); color: var(--color-primary); box-shadow: var(--shadow-sm); }
.tab-btn:hover:not(.active) { color: var(--color-text); }


/* === MOBILE CARD VIEW === */
@media (max-width: 768px) {
  .mobile-card-table thead { display: none; }
  .mobile-card-table tbody tr {
    display: block;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    margin: var(--space-2) var(--space-3);
    padding: var(--space-3);
    box-shadow: var(--shadow-sm);
  }
  .mobile-card-table tbody td {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: var(--space-1) var(--space-2);
    border: none;
    font-size: var(--text-sm);
    text-align: left !important;
    gap: var(--space-2);
  }
  .mobile-card-table tbody td::before {
    content: attr(data-label);
    font-size: var(--text-xs);
    font-weight: 700;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    margin-right: var(--space-3);
    text-align: left;
  }
  .mobile-card-table tbody td.text-right {
    text-align: left !important;
  }
  .mobile-card-table tbody td span,
  .mobile-card-table tbody td strong {
    text-align: left;
  }
  .mobile-card-table tbody td:empty { display: none; }
  .mobile-card-table tbody tr:hover { background: var(--color-surface); }
  .table-card { border-radius: var(--radius-lg); overflow: visible; }
  .table-card > div[style*="overflow-x"] { overflow-x: visible !important; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 1.4rem; }
  .two-col { grid-template-columns: 1fr; }
}
/* === MOBILE === */
.hamburger { display: none; }
@media (max-width: 768px) {
  :root {
    --text-xs: 0.85rem;
    --text-sm: 1rem;
    --text-base: 1.1rem;
    --text-lg: 1.3rem;
    --text-xl: 1.7rem;
  }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .hamburger { display: flex; }
  .page-area { padding: var(--space-4); }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 1.4rem; }
  .two-col { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .topbar { padding: var(--space-3) var(--space-4); }
  .sidebar-overlay { position: fixed; inset: 0; z-index: 99; background: oklch(0.2 0.01 80 / 0.4); display: none; }
  .sidebar-overlay.open { display: block; }
}

/* === DONUT LEGEND === */
.legend { display: flex; flex-wrap: wrap; gap: var(--space-3) var(--space-5); margin-top: var(--space-4); }
.legend-item { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-text-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: var(--radius-full); flex-shrink: 0; }

/* === TOAST === */
.toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 300; display: flex; flex-direction: column; gap: var(--space-2); pointer-events: none; }
.toast {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-lg);
  font-size: var(--text-sm);
  display: flex; align-items: center; gap: var(--space-3);
  min-width: 220px;
  pointer-events: all;
  animation: slideIn 0.2s ease;
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; }
.toast.success { border-left: 3px solid var(--color-success); }
.toast.error { border-left: 3px solid var(--color-error); }
@keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

/* === PROGRESS BAR === */
.progress-bar { height: 6px; border-radius: var(--radius-full); background: var(--color-surface-offset); overflow: hidden; margin-top: var(--space-2); }
.progress-fill { height: 100%; border-radius: var(--radius-full); background: var(--color-primary); transition: width 0.6s ease; }

/* === INLINE EDIT === */
.action-row { display: flex; gap: var(--space-2); align-items: center; }
.text-right { text-align: right; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="財富自由">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
let state = {
  accounts: [],
  transactions: [],
  stocks: [],
  stockTrades: [],
  funds: [],
  goals: [],
  currentPage: 'dashboard',
  pools: [],
  wallets: [],
  reconcileRecords: [],
  customTxFields: [],
  walletExpenseCategories: ['旅遊','餐飲','購物','交通','日用品','娛樂','其他'],
  categories: {
    income: ['薪資','投資收益','利息','其他收入'],
    expense: ['吃','飲料','禮物','日用品','化妝品','電話費','交通','醫藥費','心情購物','旅行','娛樂','保險','教育','服飾','其他'],
    other: ['帳單','轉帳']
  },
  nextId: 100,
};





// ============================================================
// EXPORT / IMPORT DATA
// ============================================================
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wealth-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('資料已匯出！');
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      Object.keys(parsed).forEach(k => { state[k] = parsed[k]; });
      saveState();
      renderPage(state.currentPage);
      showToast('資料匯入成功！');
    } catch(err) {
      showToast('匯入失敗，請確認檔案格式', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// REFRESH ALL FUND PRICES
async function refreshAllFundPrices() {
  const btn = document.getElementById('refreshFundBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" style="animation:spin 1s linear infinite"></i> 更新中…'; lucide.createIcons({ nodes: [btn] }); }
  if (!document.getElementById('spinStyle')) {
    const s = document.createElement('style');
    s.id = 'spinStyle';
    s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(s);
  }
  const today = new Date().toISOString().slice(0, 10);
  let success = 0, fail = 0, failList = [];
  // Pre-fetch both price tables once for efficiency
  let twse = {}, tpex = {};
  try { twse = await getTWSEPrices(); } catch(e) {}
  try { tpex = await getTPExPrices(); } catch(e) {}
  for (const fund of state.funds) {
    if (!fund.code) continue;
    const price = twse[fund.code] || tpex[fund.code] || 0;
    if (price > 0) {
      fund.lastPrice = price;
      fund.lastUpdated = today;
      success++;
    } else { fail++; failList.push(fund.name || fund.code); }
  }
  saveState();
  renderPage('funds');
  if (fail === 0) showToast(`✅ ${success} 支基金/ETF 報價已更新（${today}）`);
  else showToast(`已更新 ${success} 支，${fail} 支失敗（${failList.join('、')}）`, 'error');
}

// ---- HELPERS ----
const fmt = (n, dec=0) => new Intl.NumberFormat('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
const fmtCur = (n, cur='TWD') => {
  if (cur === 'TWD') return `NT$ ${fmt(n)}`;
  if (cur === 'USD') return `US$ ${fmt(n)}`;
  return `${cur} ${fmt(n)}`;
};
const pct = (a, b) => b === 0 ? 0 : ((a - b) / b * 100);
const sign = n => n >= 0 ? '+' : '';

function totalAssets() {
  const depBalance = state.accounts.reduce((s, a) => s + (a.currency === 'TWD' ? a.balance : a.balance * 31), 0);
  const stockValue = state.stocks.reduce((s, st) => s + st.shares * st.price * (st.market === '美股' ? 31 : 1), 0);
  const fundValue = state.funds.reduce((s, f) => s + f.value, 0);
  // Wallet balance: sum of contributions minus expenses
  const walletBalance = state.wallets.reduce((s, w) => {
    const inn = w.contributions.reduce((a,c)=>a+c.amount,0);
    const out = w.expenses.reduce((a,e)=>a+e.amount,0);
    return s + (inn - out);
  }, 0);
  // Deduct wallet balances from linked accounts to avoid double-counting
  const walletDeduction = state.wallets.reduce((s, w) => {
    if (!w.linkedAccountId) return s;
    const inn = w.contributions.reduce((a,c)=>a+c.amount,0);
    const out = w.expenses.reduce((a,e)=>a+e.amount,0);
    return s + (inn - out);
  }, 0);
  const adjustedDepBalance = depBalance - walletDeduction;
  return { depBalance: adjustedDepBalance, stockValue, fundValue, walletBalance, total: adjustedDepBalance + stockValue + fundValue };
}

function addAccount() {
  const name = document.getElementById('accName').value.trim();
  const bal = parseFloat(document.getElementById('accBalance').value) || 0;
  if (!name) return showToast('請輸入帳戶名稱', 'error');
  state.accounts.push({ id: state.nextId++, name, type: document.getElementById('accType').value,
    currency: document.getElementById('accCurrency').value, balance: bal,
    note: document.getElementById('accNote').value });
  closeModal('modalAddAccount'); saveState(); renderPage(state.currentPage);
  showToast('帳戶已新增');
}
function deleteAccount(id) {
  state.accounts = state.accounts.filter(a => a.id !== id);
  saveState(); renderPage(state.currentPage); showToast('帳戶已刪除');
}

function populateTxAccountSelect() {
  const sel = document.getElementById('txAccount');
  sel.innerHTML = state.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  populateCategorySelect();
}
function populateCategorySelect() {
  const container = document.getElementById('txCategoryBtns');
  const hiddenInput = document.getElementById('txCategory');
  if (!container) return;
  const allCats = [
    ...state.categories.income.map(c => ({ c, group: '收入' })),
    ...state.categories.expense.map(c => ({ c, group: '支出' })),
    ...state.categories.other.map(c => ({ c, group: '其他' }))
  ];
  const current = hiddenInput ? hiddenInput.value : '';
  container.innerHTML = allCats.map(({ c, group }) =>
    `<button type="button" class="btn btn-ghost" data-cat="${c}" onclick="selectTxCategory(this)"
      style="padding:4px 10px;font-size:var(--text-xs);${c === current ? 'background:var(--color-primary);color:#fff;border-color:var(--color-primary)' : ''}"
    >${catEmoji[c] || ''}${c}</button>`
  ).join('');
}
function selectTxCategory(btn) {
  document.getElementById('txCategory').value = btn.dataset.cat;
  document.querySelectorAll('#txCategoryBtns button').forEach(b => {
    b.style.background = b === btn ? 'var(--color-primary)' : '';
    b.style.color = b === btn ? '#fff' : '';
    b.style.borderColor = b === btn ? 'var(--color-primary)' : '';
  });
}
function addTransaction() {
  const amount = parseFloat(document.getElementById('txAmount').value) || 0;
  if (!amount) return showToast('請輸入金額', 'error');
  const accountId = parseInt(document.getElementById('txAccount').value);
  const type = document.getElementById('txType').value;
  // Collect custom fields
  const customFields = [];
  document.querySelectorAll('#txCustomFields .custom-field-row').forEach(row => {
    const label = row.querySelector('.cf-label').value.trim();
    const value = row.querySelector('.cf-value').value.trim();
    if (label) customFields.push({ label, value });
  });
  const tx = { id: state.nextId++, accountId, type, amount,
    category: document.getElementById('txCategory').value,
    date: document.getElementById('txDate').value || new Date().toISOString().slice(0,10),
    note: document.getElementById('txNote').value,
    customFields };
  state.transactions.push(tx);
  // Update balance
  const acc = state.accounts.find(a => a.id === accountId);
  if (acc) { if (type === '收入') acc.balance += amount; else if (type === '支出') acc.balance -= amount; }
  closeModal('modalAddTx'); saveState(); renderPage(state.currentPage);
  showToast('交易已新增');
}
function deleteTx(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  renderPage(state.currentPage); showToast('交易已刪除');
}

function populateStkLinkedAcc() {
  const sel = document.getElementById('stkLinkedAcc');
  if (!sel) return;
  sel.innerHTML = '<option value="">不連結帳戶</option>' +
    state.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
}
function addStock() {
  const code = document.getElementById('stkCode').value.trim();
  const name = document.getElementById('stkName').value.trim();
  const shares = parseFloat(document.getElementById('stkShares').value) || 0;
  const cost = parseFloat(document.getElementById('stkCost').value) || 0;
  const price = parseFloat(document.getElementById('stkPrice').value) || 0;
  const linkedAccountId = parseInt(document.getElementById('stkLinkedAcc').value) || null;
  if (!code || !name) return showToast('請填入代號和名稱', 'error');
  state.stocks.push({ id: state.nextId++, code, name, shares, cost, price, market: document.getElementById('stkMarket').value, linkedAccountId });
  closeModal('modalAddStock'); saveState(); renderPage(state.currentPage); showToast('股票已新增');
}

function openStockTrade(stockId, type) {
  const s = state.stocks.find(x => x.id === stockId);
  if (!s) return;
  document.getElementById('tradeStockId').value = stockId;
  document.getElementById('tradeType').value = type;
  document.getElementById('stockTradeTitle').textContent = type + '：' + s.name + '（' + s.code + '）';
  document.getElementById('tradeStockInfo').innerHTML =
    '目前持股：<strong>' + fmt(s.shares) + ' 股</strong>　' +
    '現價：<strong>' + (s.market==='美股'?'US$':'NT$') + ' ' + fmt(s.price) + '</strong>' +
    (type==='賣出' ? '　最多可賣：<strong>' + fmt(s.shares) + ' 股</strong>' : '');
  document.getElementById('tradeShares').value = '';
  document.getElementById('tradePrice').value = s.price;
  document.getElementById('tradeNote').value = '';
  document.getElementById('tradeDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('tradeTotalBox').style.display = 'none';
  // populate account select
  const accSel = document.getElementById('tradeAccount');
  accSel.innerHTML = '<option value="">不連結帳戶</option>' +
    state.accounts.map(a => `<option value="${a.id}"${s.linkedAccountId===a.id?' selected':''}>${a.name}</option>`).join('');
  document.getElementById('tradeConfirmBtn').textContent = type === '買入' ? '確認買入' : '確認賣出';
  document.getElementById('tradeConfirmBtn').style.background = type === '買入' ? 'var(--color-success)' : 'var(--color-error)';
  openModal('modalStockTrade');
}

function calcTradeTotal() {
  const shares = parseFloat(document.getElementById('tradeShares').value) || 0;
  const price = parseFloat(document.getElementById('tradePrice').value) || 0;
  const type = document.getElementById('tradeType').value;
  const stockId = parseInt(document.getElementById('tradeStockId').value);
  const s = state.stocks.find(x => x.id === stockId);
  if (!s) return;
  const isUSD = s.market === '美股';
  const total = shares * price;
  const totalTWD = isUSD ? total * 31 : total;
  const box = document.getElementById('tradeTotalBox');
  if (shares > 0 && price > 0) {
    box.style.display = 'block';
    box.innerHTML = (type === '買入' ? '💸 需支付：' : '💰 將收到：') +
      '<span style="color:' + (type==='買入'?'var(--color-error)':'var(--color-success)') + '">' +
      (isUSD ? 'US$ ' + fmt(total) + '（約 NT$ ' + fmt(totalTWD) + '）' : 'NT$ ' + fmt(total)) + '</span>';
  } else {
    box.style.display = 'none';
  }
}

function confirmStockTrade() {
  const stockId = parseInt(document.getElementById('tradeStockId').value);
  const type = document.getElementById('tradeType').value;
  const shares = parseFloat(document.getElementById('tradeShares').value) || 0;
  const price = parseFloat(document.getElementById('tradePrice').value) || 0;
  const date = document.getElementById('tradeDate').value;
  const note = document.getElementById('tradeNote').value.trim();
  const accountId = parseInt(document.getElementById('tradeAccount').value) || null;

  if (shares <= 0 || price <= 0) return showToast('請填入股數與價格', 'error');

  const s = state.stocks.find(x => x.id === stockId);
  if (!s) return;

  if (type === '賣出' && shares > s.shares) return showToast('賣出股數超過持股數量', 'error');

  const isUSD = s.market === '美股';
  const totalTWD = shares * price * (isUSD ? 31 : 1);

  // Update stock shares & cost
  if (type === '買入') {
    const oldTotal = s.shares * s.cost;
    const newTotal = oldTotal + shares * price;
    s.shares += shares;
    s.cost = s.shares > 0 ? newTotal / s.shares : price;
    s.linkedAccountId = accountId || s.linkedAccountId;
  } else {
    s.shares -= shares;
    if (s.shares <= 0) { s.shares = 0; }
  }

  // Update account balance
  if (accountId) {
    const acc = state.accounts.find(a => a.id === accountId);
    if (acc) {
      acc.balance += type === '買入' ? -totalTWD : totalTWD;
    }
  }

  // Add transaction record
  state.transactions.push({
    id: state.nextId++,
    accountId: accountId,
    type: type === '買入' ? '支出' : '收入',
    amount: totalTWD,
    category: type === '買入' ? '股票買入' : '股票賣出',
    date: date || new Date().toISOString().slice(0,10),
    note: (note || '') + ' ' + s.code + ' ' + s.name + ' ' + shares + '股 @' + price,
    customFields: {}
  });

  // Record trade history
  if (!state.stockTrades) state.stockTrades = [];
  state.stockTrades.push({
    id: state.nextId++,
    stockId, code: s.code, name: s.name,
    type, shares, price, totalTWD,
    date: date || new Date().toISOString().slice(0,10),
    note, accountId
  });

  closeModal('modalStockTrade');
  saveState();
  renderPage('stocks');
  showToast(type === '買入' ? '買入成功！已更新持股與帳戶' : '賣出成功！已更新持股與帳戶');
}

  state.stocks = state.stocks.filter(s => s.id !== id);
  saveState(); renderPage(state.currentPage); showToast('股票已刪除');

// ============================================================
// PRICE ENGINE — TWSE / TPEx OpenAPI (no proxy needed, CORS allowed)
// ============================================================
let _twseCache = null, _tpexCache = null, _cacheDate = null;

async function getTWSEPrices() {
  const today = new Date().toISOString().slice(0, 10);
  if (_twseCache && _cacheDate === today) return _twseCache;
  const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL', { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('TWSE API error');
  const data = await res.json();
  _twseCache = {};
  data.forEach(s => { _twseCache[s.Code] = parseFloat(s.ClosingPrice); });
  _cacheDate = today;
  return _twseCache;
}

async function getTPExPrices() {
  const today = new Date().toISOString().slice(0, 10);
  if (_tpexCache && _cacheDate === today) return _tpexCache;
  const res = await fetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes', { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('TPEx API error');
  const data = await res.json();
  _tpexCache = {};
  data.forEach(s => { _tpexCache[s.SecuritiesCompanyCode] = parseFloat(s.Close) || parseFloat(s.ClosingPrice) || 0; });
  _cacheDate = today;
  return _tpexCache;
}

async function fetchTWPrice(code) {
  // Try TWSE first, then TPEx
  try {
    const twse = await getTWSEPrices();
    if (twse[code] && twse[code] > 0) return twse[code];
  } catch(e) {}
  try {
    const tpex = await getTPExPrices();
    if (tpex[code] && tpex[code] > 0) return tpex[code];
  } catch(e) {}
  throw new Error(`找不到 ${code} 的報價`);
}

// Kept for US stocks fallback
const PROXY = 'https://corsproxy.io/?';
async function fetchYahooPrice(symbol) {
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url='
  ];
  const url = \`https://query1.finance.yahoo.com/v8/finance/chart/\${symbol}?interval=1d&range=1d\`;
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price && price > 0) return price;
    } catch(e) { continue; }
  }
  throw new Error('Yahoo API 失敗');
}

async function fetchYahooPrice(symbol) {
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
    'https://thingproxy.freeboard.io/fetch/'
  ];
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price && price > 0) return price;
    } catch(e) { continue; }
  }
  // Fallback: TWSE/OTC for .TW stocks
  if (symbol.endsWith('.TW')) {
    const code = symbol.replace('.TW', '');
    for (const type of ['tse', 'otc']) {
      try {
        const r = await fetch(`/.netlify/functions/stock?type=${type}&id=${code}`, { signal: AbortSignal.timeout(6000) });
        if (r.ok) {
          const d = await r.json();
          if (d.msgArray?.length > 0) {
            const p = parseFloat(d.msgArray[0].z) || parseFloat(d.msgArray[0].y);
            if (p > 0) return p;
          }
        }
      } catch(e) {}
    }
  }
  throw new Error('所有報價來源失敗');
}

async function refreshAllPrices() {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader-2" style="animation:spin 1s linear infinite"></i> 更新中…';
  lucide.createIcons({ nodes: [btn] });

  // Add spin keyframe if not exists
  if (!document.getElementById('spinStyle')) {
    const s = document.createElement('style');
    s.id = 'spinStyle';
    s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(s);
  }

  let success = 0, fail = 0, failList = [];

  const today = new Date().toISOString().slice(0, 10);

  // Pre-fetch TWSE/TPEx tables once
  let twsePrices = {}, tpexPrices = {};
  try { twsePrices = await getTWSEPrices(); } catch(e) {}
  try { tpexPrices = await getTPExPrices(); } catch(e) {}

  for (const stock of state.stocks) {
    try {
      let price = 0;
      if (stock.market === '台股') {
        price = twsePrices[stock.code] || tpexPrices[stock.code] || 0;
        if (!price) throw new Error('not found');
      } else {
        // 美股/港股 use Yahoo
        let symbol = stock.code;
        if (stock.market === '港股') symbol = stock.code + '.HK';
        price = await fetchYahooPrice(symbol);
      }
      stock.price = Math.round(price * 100) / 100;
      stock.lastUpdated = today;
      success++;
    } catch(e) {
      fail++;
      failList.push(stock.name);
    }
  }

  // 同步更新高股息/基金/ETF 報價
  let fundSuccess = 0, fundFail = 0;
  for (const fund of state.funds) {
    if (!fund.code) continue;
    let symbol = fund.code;
    if (/^\d{4,6}$/.test(symbol)) symbol = symbol + '.TW';
    try {
      const price = await fetchYahooPrice(symbol);
      if (price && price > 0) {
        fund.lastPrice = Math.round(price * 100) / 100;
        fund.lastUpdated = today;
        fundSuccess++;
      }
    } catch(e) { fundFail++; }
  }

  saveState();
  renderPage('stocks');

  const fundMsg = fundSuccess > 0 ? `，基金/ETF ${fundSuccess} 支` : '';
  if (fail === 0) {
    showToast(`✅ ${success} 支股票${fundMsg}報價已更新（${today}）`);
  } else if (success > 0) {
    showToast(`已更新 ${success} 支${fundMsg}，${fail} 支失敗（${failList.join('、')}）`, 'error');
  } else {
    showToast('更新失敗，請稍後再試或手動點擊現價輸入', 'error');
  }
}

async function saveToCloud() {

// Auto-save after any data mutation (debounced)
let _autoSaveTimer = null;
function scheduleAutoSave() {
  if (!window._currentUser || !window._fbSave) return;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveToCloud, 3000);

// MONTHLY RECONCILE (每月對帳)
// ============================================================
let reconcileMonth = new Date().toISOString().slice(0, 7);

function renderReconcile(el) {
  // Build current expected balance per account (from transactions up to end of selected month)
  const monthEnd = reconcileMonth + '-31';
  const accountExpected = {};
  state.accounts.forEach(a => { accountExpected[a.id] = a.balance; });

  // Find existing reconcile record for this month
  const existing = state.reconcileRecords.find(r => r.month === reconcileMonth);

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-5);flex-wrap:wrap">
      <div>
        <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-muted);margin-bottom:var(--space-2)">對帳月份</div>
        <input class="form-input" type="month" id="reconcileMonthPicker" value="${reconcileMonth}"
          style="font-size:var(--text-base);font-weight:700;width:auto"
          onchange="reconcileMonth=this.value;renderPage('reconcile')" />
      </div>
      <button class="btn btn-primary" style="margin-top:auto" onclick="saveReconcile()">
        <i data-lucide="save"></i> 儲存對帳結果
      </button>
    </div>

    <!-- Input table -->
    <div class="table-card" style="margin-bottom:var(--space-5)">
      <div class="table-card-header">
        <span class="section-title">輸入實際餘額</span>
        <span style="font-size:var(--text-xs);color:var(--color-text-muted)">填入當月底實際盤點金額</span>
      </div>
      <table class="mobile-card-table">
        <thead><tr>
          <th>帳戶</th><th>類型</th>
          <th class="text-right">系統計算餘額</th>
          <th class="text-right">實際餘額（請輸入）</th>
          <th class="text-right">差額</th>
          <th>狀態</th>
        </tr></thead>
        <tbody id="reconcileRows">
          ${state.accounts.map(a => {
            const prev = existing ? existing.entries.find(e => e.accountId === a.id) : null;
            const actual = prev ? prev.actual : '';
            const expected = a.currency === 'TWD' ? a.balance : a.balance;
            const diff = actual !== '' ? (parseFloat(actual) - expected) : null;
            return `<tr>
              <td data-label="帳戶"><strong>${a.name}</strong></td>
              <td data-label="類型"><span class="badge ${a.type==='活存'?'badge-green':a.type==='定存'?'badge-blue':a.type==='外幣'?'badge-gold':a.type==='現金'?'badge-orange':'badge-orange'}">${a.type}</span></td>
              <td data-label="系統餘額" class="td-mono text-right">${fmtCur(expected, a.currency)}</td>
              <td data-label="實際餘額" class="text-right">
                <input class="form-input reconcile-actual" data-acc="${a.id}" data-expected="${expected}"
                  type="number" placeholder="輸入實際金額" value="${actual}"
                  style="text-align:right;width:160px;font-family:var(--font-mono)"
                  oninput="updateReconcileDiff(this)" />
              </td>
              <td class="td-mono text-right reconcile-diff-${a.id}" style="color:${diff===null?'var(--color-text-faint)':diff===0?'var(--color-success)':diff>0?'var(--color-blue)':'var(--color-error)'}">
                ${diff === null ? '—' : diff === 0 ? '✓ 相符' : (diff > 0 ? '+' : '') + fmt(diff)}
              </td>
              <td class="reconcile-status-${a.id}">
                ${diff === null ? '' : diff === 0
                  ? '<span class="badge badge-green">相符</span>'
                  : `<span class="badge badge-red">差額 ${fmtCur(Math.abs(diff), a.currency)}</span>`}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Past records -->
    ${state.reconcileRecords.length > 0 ? `
    <div class="table-card">
      <div class="table-card-header"><span class="section-title">歷史對帳紀錄</span></div>
      <table class="mobile-card-table">
        <thead><tr><th>月份</th><th>帳戶</th><th class="text-right">系統餘額</th><th class="text-right">實際餘額</th><th class="text-right">差額</th><th>狀態</th><th></th></tr></thead>
        <tbody>
          ${[...state.reconcileRecords].sort((a,b)=>b.month.localeCompare(a.month)).flatMap(r =>
            r.entries.map((e,i) => {
              const acc = state.accounts.find(a => a.id === e.accountId);
              const diff = e.actual - e.expected;
              return `<tr>
                ${i===0?`<td rowspan="${r.entries.length}" style="vertical-align:top;padding-top:var(--space-4)"><strong>${r.month}</strong></td>`:''}
                <td>${acc ? acc.name : '已刪除'}</td>
                <td class="td-mono text-right td-muted">${fmt(e.expected)}</td>
                <td class="td-mono text-right">${fmt(e.actual)}</td>
                <td class="td-mono text-right" style="color:${diff===0?'var(--color-success)':diff>0?'var(--color-blue)':'var(--color-error)'}">
                  ${diff===0?'—':(diff>0?'+':'')+fmt(diff)}
                </td>
                <td>${diff===0?'<span class="badge badge-green">相符</span>':'<span class="badge badge-red">差額</span>'}</td>
                ${i===0?`<td rowspan="${r.entries.length}" style="vertical-align:top"><button class="btn btn-ghost" style="padding:var(--space-1) var(--space-2)" onclick="deleteReconcile('${r.month}')"><i data-lucide="trash-2" style="width:13px;height:13px"></i></button></td>`:''}
              </tr>`;
            })
          ).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

function updateReconcileDiff(input) {
  const accId = parseInt(input.dataset.acc);
  const expected = parseFloat(input.dataset.expected);
  const actual = parseFloat(input.value);
  const diffEl = document.querySelector(`.reconcile-diff-${accId}`);
  const statusEl = document.querySelector(`.reconcile-status-${accId}`);
  if (!diffEl) return;
  if (isNaN(actual)) {
    diffEl.textContent = '—'; diffEl.style.color = 'var(--color-text-faint)';
    statusEl.innerHTML = ''; return;
  }
  const diff = actual - expected;
  diffEl.textContent = diff === 0 ? '✓ 相符' : (diff > 0 ? '+' : '') + fmt(diff);
  diffEl.style.color = diff === 0 ? 'var(--color-success)' : diff > 0 ? 'var(--color-blue)' : 'var(--color-error)';
  statusEl.innerHTML = diff === 0
    ? '<span class="badge badge-green">相符</span>'
    : `<span class="badge badge-red">差額 NT$ ${fmt(Math.abs(diff))}</span>`;
}

function saveReconcile() {
  const inputs = document.querySelectorAll('.reconcile-actual');
  const entries = [];
  inputs.forEach(input => {
    const actual = parseFloat(input.value);
    if (!isNaN(actual)) {
      entries.push({ accountId: parseInt(input.dataset.acc), expected: parseFloat(input.dataset.expected), actual });
    }
  });
  if (entries.length === 0) return showToast('請至少輸入一個帳戶的實際餘額', 'error');

  // Remove existing record for this month then add new
  state.reconcileRecords = state.reconcileRecords.filter(r => r.month !== reconcileMonth);
  state.reconcileRecords.push({ id: state.nextId++, month: reconcileMonth, entries });

  const mismatches = entries.filter(e => e.actual !== e.expected);
  renderPage('reconcile');
  if (mismatches.length === 0) {
    showToast('✅ 本月所有帳戶金額相符！');
  } else {
    showToast(`⚠️ ${mismatches.length} 個帳戶有差額，請確認`, 'error');
  }
}

function deleteReconcile(month) {
  state.reconcileRecords = state.reconcileRecords.filter(r => r.month !== month);
  renderPage('reconcile');
  showToast('對帳紀錄已刪除');
}
